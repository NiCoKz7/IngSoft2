<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquetas de Formularios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container py-4">
    <header class="mb-4">
        <h1>Etiquetas relacionadas con formularios</h1>
        <p class="lead">Ejemplos de etiquetas y controles de formularios en HTML.</p>
        <a class="btn btn-primary" href="index.html">Volver al index</a>
    </header>

    <main>
        <form action="#" method="post" class="border rounded p-4">
            <fieldset class="mb-4">
                <legend>Datos personales</legend>

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input id="nombre" name="nombre" type="text" class="form-control" placeholder="Escribí tu nombre">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="correo@ejemplo.com">
                </div>

                <div class="mb-3">
                    <label for="edad" class="form-label">Edad</label>
                    <input id="edad" name="edad" type="number" min="1" max="120" class="form-control">
                </div>

                <div class="mb-3">
                    <label for="nacimiento" class="form-label">Fecha de nacimiento</label>
                    <input id="nacimiento" name="nacimiento" type="date" class="form-control">
                </div>
            </fieldset>

            <fieldset class="mb-4">
                <legend>Preferencias</legend>

                <div class="mb-3">
                    <label for="lenguaje" class="form-label">Lenguaje favorito</label>
                    <input id="lenguaje" name="lenguaje" list="lenguajes" class="form-control" placeholder="Seleccioná o escribí uno">
                    <datalist id="lenguajes">
                        <option value="JavaScript"></option>
                        <option value="Python"></option>
                        <option value="Java"></option>
                        <option value="C#"></option>
                    </datalist>
                </div>

                <div class="mb-3">
                    <label for="turno" class="form-label">Turno</label>
                    <select id="turno" name="turno" class="form-select">
                        <optgroup label="Mañana">
                            <option value="manana-a">Comisión A</option>
                            <option value="manana-b">Comisión B</option>
                        </optgroup>
                        <optgroup label="Noche">
                            <option value="noche-a">Comisión A</option>
                            <option value="noche-b">Comisión B</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="noticias" name="noticias">
                    <label class="form-check-label" for="noticias">Quiero recibir novedades</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" id="presencial" name="modalidad" value="presencial">
                    <label class="form-check-label" for="presencial">Modalidad presencial</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" id="virtual" name="modalidad" value="virtual">
                    <label class="form-check-label" for="virtual">Modalidad virtual</label>
                </div>
            </fieldset>

            <fieldset class="mb-4">
                <legend>Comentarios</legend>
                <div class="mb-3">
                    <label for="comentarios" class="form-label">Mensaje</label>
                    <textarea id="comentarios" name="comentarios" class="form-control" rows="4" placeholder="Escribí tu mensaje"></textarea>
                </div>
                <div class="mb-3">
                    <label for="archivo" class="form-label">Adjuntar archivo</label>
                    <input id="archivo" name="archivo" type="file" class="form-control">
                </div>
            </fieldset>

            <div class="mb-3">
                <label class="form-label" for="avance">Progreso del formulario</label>
                <progress id="avance" value="70" max="100" class="w-100"></progress>
            </div>

            <div class="mb-3">
                <label class="form-label" for="nivel">Nivel de satisfacción</label>
                <meter id="nivel" min="0" max="10" value="8" class="w-100">8 de 10</meter>
            </div>

            <div class="mb-3">
                <label class="form-label">Resultado estimado:</label>
                <output name="resultado">Formulario listo para enviar</output>
            </div>

            <button type="submit" class="btn btn-success">Enviar</button>
            <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
        </form>
    </main>

    <footer class="mt-4">
        <a class="btn btn-outline-primary" href="index.html">Volver al index</a>
    </footer>
</body>
</html>
